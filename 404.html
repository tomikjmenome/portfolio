<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Tomáš Hájek</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="img/icons/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="img/icons/web-icon.png" sizes="any">
    <link rel="stylesheet" href="css/reset.css">
    <style>
        body {
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: var(--font-body);
            padding: 2rem;
            text-align: center;
            overflow: hidden;
        }

        .e404-logo {
            position: fixed;
            top: 2rem;
            left: 2rem;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--white);
            letter-spacing: -0.02em;
            text-decoration: none;
            z-index: 10;
        }

        .e404-logo span {
            color: var(--accent);
        }

        .e404-eyebrow {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .e404-number {
            width: min(80vw, 560px);
            overflow: visible;
            display: block;
            margin: 0 auto 2rem;
        }

        .e404-number text {
            font-size: 260px;
            font-weight: 900;
            font-family: var(--font-heading);
            fill: none;
            stroke: var(--accent);
            stroke-width: 2;
            text-anchor: middle;
            dominant-baseline: central;
            text-rendering: geometricPrecision;
            letter-spacing: -10px;
        }

        .e404-msg {
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            color: #888;
            margin-bottom: 2.5rem;
            max-width: 420px;
            line-height: 1.6;
        }

        .e404-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 2rem;
            background: var(--accent);
            color: var(--white);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-decoration: none;
            transition: background 0.2s, color 0.2s, transform 0.2s;
            border: 2px solid var(--accent);
        }

        .e404-btn:hover {
            background: transparent;
            color: var(--accent);
            transform: translateY(-2px);
        }

        /* Decorative diagonal stripe — same as footer top border */
        .e404-stripe {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: repeating-linear-gradient(
                45deg,
                var(--accent),
                var(--accent) 10px,
                var(--black) 10px,
                var(--black) 20px
            );
        }

        @media (max-width: 480px) {
            .e404-number text { font-size: 180px; stroke-width: 1.5; }
            .e404-number { margin-bottom: 1.5rem; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="e404-logo">TH<span>.</span></a>

    <p class="e404-eyebrow">Error 404</p>

    <svg class="e404-number" viewBox="0 0 560 260" aria-hidden="true">
        <text x="280" y="140">404</text>
    </svg>

    <p class="e404-msg">Stránka, kterou hledáš, neexistuje nebo byla přesunuta.</p>

    <a href="index.html" class="e404-btn">
        ← Zpět na portfolio
    </a>

    <div class="e404-stripe" aria-hidden="true"></div>

</body>
</html>
